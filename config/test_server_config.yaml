proxy_location: EveryNode

http_option:
  host: 0.0.0.0
  post: 8080


application:
  - name: MotionGenerator
    route: /momask_generator
    import_path: main:build_app
    args:
      checkpoints_dir: ./checkpoints
      dataset_name: 't2m'
      vae_config:
        dim_pose: 263
        nb_code: 1024
        code_dim: 512
        output_emb_width: 512
        down_t: 3
        stride_t: 2
        width: 512
        depth: 3
        dilation_growth_rate: 3
        vq_act: 'relu'
        vq_norm: 'None'

      trans_model_config:
        code_dim: 512
        latent_dim: 384
        clip_dim: 512
        ff_size: 1024
        n_layers: 8
        n_heads: 6
        dropout: 0.2
        cond_drop_prob: 0.1

      res_model_config:
        num_quantizers: 6
        num_tokens: 512
        latent_dim: 384
        ff_size: 1024
        shared_codebook: False
        cond_drop_prob: 0.2
        share_weight: True




    deployment:
    - name: MotionGenerator
      ray_actor_options:
        num_cpus: 0.5
        num_gpus: 0.3
      autoscaling_config:
        min_replicas: 1
        max_replicas: 10
        target_ongoing_requests: 10
        

                config.dim_pose,
                config.nb_code,
                config.code_dim,
                config.output_emb_width,
                config.down_t,
                config.stride_t,
                config.width,
                config.depth,
                config.dilation_growth_rate,
                config.vq_act,
                config.vq_norm)


